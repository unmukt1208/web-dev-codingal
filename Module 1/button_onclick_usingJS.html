<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
           #button {
            font-family: Georgia, 'Times New Roman', Times, serif;

            }
        </style>
</head> 

<body class="p-5">
    <h1>Buttons Onclick in JS</h1>
    <p>When this button is clicked, a text saying "Congrats, the onclick function works"</p>

    <label for="button"></label><button type="button" class="btn" style="background-color: rgb(0, 255, 255)"
        onclick="button_click()">Click Me!</button> <br><br>
        <p id="output"></p>
    <script>
        function button_click() {
            document.getElementById("output").innerText = "Congrats, the onclick function works"
        }
    </script>


















    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
