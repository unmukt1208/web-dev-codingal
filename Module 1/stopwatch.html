<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stopwatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background: rgb(137, 0, 255);
            height: 600px;
        }

        #div {
            background: rgb(57, 220, 20)
        }
    </style>
</head>

<body class="d-flex flex-column justify-content-center align-items-center ">
    <h1 id="heading" class="text-white">Stopwatch using JS</h1>
    <div class="container-md rounded-4 p-3 w-50 py-4 d-flex flex-column justify-content-center align-items-center"
        id="div">
        <h3>Stopwatch</h2>
            <h1 id="timer" class="m-2">00:00:00</h1>
            <div>
                <button type="button" class="btn btn-success" onclick="start()" id="start_btn">Start</button>
                <button type="button" class="btn btn-danger" onclick="stop()" id="stop_btn">Stop</button>
                <button type="button" class="btn btn-warning" onclick="reset()" id="reset_btn">Reset</button>
            </div>
    </div>
    <script>
        let timer = null
        let start_time = 0
        let elapsed_time = 0
        let is_running = false
        function start() {
            if (!is_running) {
                start_time = Date.now() - elapsed_time
                timer = setInterval(update, 1)
                is_running = true
                toggle()
                
            }
        }
        function stop() {
            if (is_running) {
                clearInterval(timer)
                is_running = false
                toggle()
            }
        }
        function reset() {
            clearInterval(timer)
            start_time = 0
            elapsed_time = 0
            is_running = false
            document.getElementById("timer").textContent = "00:00:00"
            document.getElementById("start_btn").disabled = false
            document.getElementById("stop_btn").disabled = true
        }
        function update() {
            const current_time=Date.now()
            elapsed_time=current_time-start_time
            
            let hours = Math.floor(elapsed_time / (1000 * 60 * 60));

            let minutes = Math.floor(elapsed_time / (1000 * 60) % 60);

            let seconds = Math.floor(elapsed_time / 1000 % 60);

            let milliseconds = Math.floor(elapsed_time % 1000 / 10);
            
            minutes = String(minutes).padStart(2, "0");

            seconds = String(seconds).padStart(2, "0");

            milliseconds = String(milliseconds).padStart(2, "0");
            
            document.getElementById("timer").textContent=minutes + ":" + seconds + ":" + milliseconds
            

        }
        function toggle() {
            document.getElementById("start_btn").disabled=is_running
            document.getElementById("stop_btn").disabled = !is_running
        }
        
    </script>
































    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
