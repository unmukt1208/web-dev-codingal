<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mini Dash Game</title>

    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        canvas {
            background: #222;
            display: block;
            margin: auto;
        }
    </style>

</head>

<body>

    <h2>Mini Dash Game</h2>
    <p>Press SPACE to jump</p>

    <canvas id="game" width="800" height="300"></canvas>

    <script>

        const canvas = document.getElementById("game")
        const ctx = canvas.getContext("2d")

        let player = {
            x: 100,
            y: 200,
            size: 30,
            velocity: 0,
            gravity: 0.6,
            jump: -12
        }

        let spikes = []
        let score = 0
        let gameOver = false

        function spawnSpike() {

            spikes.push({
                x: 800,
                y: 220,
                size: 30
            })

        }

        setInterval(spawnSpike, 1500)

        document.addEventListener("keydown", function (e) {

            if (e.code === "Space" && player.y >= 200) {
                player.velocity = player.jump
            }

            if (gameOver && e.code === "Space") {
                location.reload()
            }

        })

        function update() {

            ctx.clearRect(0, 0, 800, 300)

            player.velocity += player.gravity
            player.y += player.velocity

            if (player.y > 200) {
                player.y = 200
            }

            ctx.fillStyle = "cyan"
            ctx.fillRect(player.x, player.y, player.size, player.size)

            for (let i = 0; i < spikes.length; i++) {

                let spike = spikes[i]

                spike.x -= 5

                ctx.fillStyle = "red"
                ctx.beginPath()
                ctx.moveTo(spike.x, 250)
                ctx.lineTo(spike.x + 15, 220)
                ctx.lineTo(spike.x + 30, 250)
                ctx.fill()

                if (
                    player.x < spike.x + 30 &&
                    player.x + player.size > spike.x &&
                    player.y < spike.y + 30 &&
                    player.y + player.size > spike.y
                ) {
                    gameOver = true
                }

            }

            ctx.fillStyle = "white"
            ctx.font = "20px Arial"
            ctx.fillText("Score: " + score, 650, 30)

            if (!gameOver) {
                score++
                requestAnimationFrame(update)
            } else {

                ctx.fillStyle = "white"
                ctx.font = "40px Arial"
                ctx.fillText("Game Over", 300, 150)

                ctx.font = "20px Arial"
                ctx.fillText("Press SPACE to restart", 290, 190)

            }

        }

        update()

    </script>

</body>

</html>
