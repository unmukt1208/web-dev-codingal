<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="d-flex align-items-center justify-content-center bg-info p-5">
    <div class="border bg-primary p-5 rounded-4 m-5">
        <label for="num1">Enter desired number</label>
        <input type="number" name="num1" id="num1">
        <br><br>
        <label for="num2">Enter second desired number</label>
        <input type="number" name="num2" id="num2"> <br><br>
        <button type="button" class="btn btn-warning" onclick="mul()">*</button>
        <p id="answer"></p>
    </div>

    <script>
        function mul() {
            var num1 = Number(document.getElementById("num1").value);
            var num2 = Number(document.getElementById("num2").value);
            var mul = num1 * num2;
            document.getElementById("answer").innerHTML =
                "The answer is: " + mul

        }
    </script>










    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
