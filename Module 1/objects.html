<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects in JavaScript</title>
</head>

<body>
    <h1>Objects in JavaScript</h1>
    <p id="output"></p>
    <script>
        var student1 = { name: "Tom", grade: 7, age: 13, city: "Hannover", hobby: "Football", bloodGroup: "O+" }
        document.getElementById("output").innerText = "Hi, my name is " + student1.name + ". I'm from the city of " + student1.city + ". My hobby is " + student1.hobby + ". My grade level is " + student1.grade + ". My age is " + student1.age + ". My blood group is " + student1.bloodGroup
    </script>

</body>

</html>
