<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="output"></p>
    <p id="error_mssg"></p>
    <script>
        try{

            function mul(x,y){
                return x*y
            }
            result = mul(4,5)
            document.getElementById("output").innerHTML=result
        }
        catch(error){
            document.getElementById("error_mssg").innerHTML=error.message
        }
    </script>
</body>
</html>
