<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .chat-header {
            background: #2563eb;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
        }

        .user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #334155;
            color: white;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .chat-input button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            AI Chatbot
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                Hello! I am your AI chatbot.
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");

        function sendMessage() {
            const text = userInput.value.trim();

            if (text === "") return;

            // User message
            addMessage(text, "user");

            // Bot reply
            setTimeout(() => {
                let reply = getBotReply(text);
                addMessage(reply, "bot");
            }, 500);

            userInput.value = "";
        }

        function addMessage(message, sender) {
            const msgDiv = document.createElement("div");

            msgDiv.classList.add("message", sender);
            msgDiv.innerText = message;

            chatBox.appendChild(msgDiv);

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function getBotReply(input) {
            input = input.toLowerCase();

            if (input.includes("hello") || input.includes("hi")) {
                return "Hello there!";
            }

            if (input.includes("how are you")) {
                return "I'm doing great!";
            }

            if (input.includes("your name")) {
                return "I am a simple AI chatbot.";
            }

            if (input.includes("bye")) {
                return "Goodbye!";
            }

            return "I don't understand that yet.";
        }

        // Press Enter to send
        userInput.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>

</body>

</html>
