<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            body {
                background-color: lightblue;
                font-family: Arial, sans-serif;
                text-align: center;
            }
            #b{
                background-color: rgb(255,165,0);
            }
        </style>
</head>

<body>
    <div class="container mt-4 border border-danger rounded-4 p-5 m-5 border-5" id="b"><h1>Form Validation using HTML DOM</h1>
    <label for="username">Username: </label> <input type="text" name="username" id="username"><br><br> <label
        for="email">E-Mail: </label> <input type="email" name="email" id="email"><br><br>
    <label for="password">Password: </label> <input type="password" name="password" id="password"> <br><br>
    <button type="button" class="btn btn-success" onclick="login()">Log In</button>
    <p id="output"></p></div>
    


    <script>
        const correct_username="unmuktmishra"
        const correct_email="unmuktmishra@gmail.com"
        const correct_password="1234"
        function login() {
            const username=document.getElementById("username").value
            const email = document.getElementById("email").value
            const password = document.getElementById("password").value
            if(username===correct_username && password===correct_password && email===correct_email) {
                document.getElementById("output").innerText = "You've Succesfully Logged In."
            } 
            else{
                document.getElementById("output").innerText="Log In Failed, Please Try Again."
            }
        }
    </script>















    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
