<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Java Script Datatypes, Let Keywords and Loops.</h2>
    <p id="result"></p>
    <script>
        let i;
        i=0
        let text = " "
        while(i<10){
            text += "The Values Inside The Block: " + i + " "
            i++
        }
       
        document.getElementById("result").innerHTML= text;
       
       
            document.write("The value of i outside the block is: " + i);
        
    </script>
</body>
</html>
