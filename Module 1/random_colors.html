<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color</title>
</head>
<body>
    <button onclick="change_color()">Change Color of Screen</button>
    <script>
        function change_color(){
            var bgcolor = "rgb(" + Math.random() + "," + Math.random() + "," + Math.random() + ")";
            document.body.style.background=bgcolor;
        }
    </script>
</body>
</html>
