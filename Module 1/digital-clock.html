<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Digital Clock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="bg-warning d-flex flex-column justify-content-center align-items-center vh-100">
    <h1 class="d-flex flex-column justify-content-center align-items-center">Digital Clock</h1>
    <div
        class="container-sm d-flex flex-column justify-content-center align-items-center border border-5 rounded-4 border-primary text-bg-info p-5 w-50">
        <h4 id="date">Hello Style</h4>
        <h2 id="time">0000000</h2>
    </div>
    <script>
        function update_clock() {
            const now = new Date()
            const hours = now.getHours()
            const minutes = now.getMinutes()
            const seconds = now.getSeconds()
            document.getElementById("time").textContent = `${hours}:${minutes}:${seconds}`

            const options = {
                weekday: "long",
                year: "numeric",
                day: "numeric",
                month: "long"
            }
            document.getElementById("date").textContent = now.toLocaleDateString(undefined, options)
        }
        setInterval(update_clock, 1000)
        update_clock()
    </script>







































    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
