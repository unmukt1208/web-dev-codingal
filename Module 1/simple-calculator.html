<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="d-flex align-items-center justify-content-center bg-warning p-5">
    <div class="border bg-info p-5 rounded-4 m-5">
        <h1>Simple Calculator</h1>
        <label for="num1">Enter First Number: </label>
        <input type="number" name="num1" id="num1">
        <br><br>
        <label for="num1">Enter Second Number: </label>
        <input type="number" name="num2" id="num2">
        <br><br>
        <button type="button" class="btn btn-primary" onclick="add()">+</button>
        <button type="button" class="btn btn-secondary" onclick="sub()">-</button>
        <button type="button" class="btn btn-success" onclick="mul()">*</button>
        <button type="button" class="btn btn-danger" onclick="div()">/</button>
        <p id="display"></p>
        <p id="output"></p>
    </div>
    <script>



        function add() {
            var num1 = Number(document.getElementById("num1").value);
            var num2 = Number(document.getElementById("num2").value);

            var add = num1 + num2;

            document.getElementById("output").innerHTML =
                "The added value is: " + add;

        }
        function sub() {
            var num1 = Number(document.getElementById("num1").value);
            var num2 = Number(document.getElementById("num2").value);
            var sub = num1 - num2;
            document.getElementById("output").innerHTML =
                "The subtracted value is: " + sub;

        }
        function mul() {
            var num1 = Number(document.getElementById("num1").value);
            var num2 = Number(document.getElementById("num2").value);
            var mul = num1 * num2;
            document.getElementById("output").innerHTML =
                "The multiplied value is: " + mul

        }
        function div() {
            var num1 = Number(document.getElementById("num1").value);
            var num2 = Number(document.getElementById("num2").value);
            var div = num1 / num2;
            document.getElementById("output").innerHTML =
                "The divided value is: " + div;

        }



    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>




</body>

</html>
