<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #b {
            background-color: rgb(255, 165, 0);
        }
    </style>
</head>

<body>
    <div class="container mt-4 border border-danger rounded-4 p-5 m-5 border-5" id="b">
        <h1>Form Validation using HTML DOM</h1>
        <label for="email">E-Mail: </label> <input type="email" name="email" id="email"><br><br>
        <label for="age">Age: </label> <input type="number" name="age" id="age"> <br><br>
        <button type="button" class="btn btn-success" onclick="login()">Log In</button>
        <p id="output"></p>
        <script>
            function login() {
                const email = document.getElementById("email").value
                const age = document.getElementById("age").value
                if (age < 18) {
                    document.getElementById("output").innerHTML = "Sorry, you are too young to access"
                }
                else if (age > 35) {

                    document.getElementById("output").innerHTML = "Sorry, you are too old to access this website"

                }

                else {
                    document.getElementById("output").innerHTML = "You have succesfully logged in!"
                }
                if(email===""){
                    document.getElementById("output").innerHTML="You must give an email"
                }

            }

        </script>
    </div>
