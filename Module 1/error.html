<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Handling in JS</title>
</head>
<body>
    <h1>Error Handling in JS</h1>
    <p id="error_mssg"></p>
    <p id="output"></p>
    <script>
        try{
            function sum(n1,n2){
                return n1+n2
            }
            result = sum(4,5)
            document.getElementById("output").innerHTML=result
        }
        catch(error){
            document.getElementById("error_mssg").innerHTML=error.message
        }
    </script>
</body>
</html>
